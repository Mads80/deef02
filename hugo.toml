identifier = 'about'
name = 'About'
url = '/about/'
weight = 2

[[menu.main]]
identifier = 'search'
name = 'Search'
url = '/search/'
weight = 3

[[menu.main]]
identifier = 'tags'
name = 'Tags'
url = '/tags'
weight = 4

[[menu.main]]
